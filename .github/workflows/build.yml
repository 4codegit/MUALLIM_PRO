name: Build and Release

env:
  MESA_VERSION: 26.1.1

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            output: edonish-auto
          - os: windows-latest
            target: windows-amd64
            output: edonish-auto.exe
          - os: macos-latest
            target: macos-amd64
            output: edonish-auto-mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgl1-mesa-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libglu1-mesa-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      - name: Get version from tag or config
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'Version = ' FyneApp.toml | awk -F'"' '{print $2}')
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Building version: ${{ steps.version.outputs.VERSION }}"
        shell: bash

      - name: Download dependencies
        run: GONOSUMCHECK=* GOFLAGS=-insecure go mod tidy
        shell: bash

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o ${{ matrix.output }} .
        shell: bash

      - name: Bundle Windows portable package with Mesa OpenGL
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $mesaArchive = "mesa3d-$env:MESA_VERSION-release-msvc.7z"
          curl.exe -L --retry 3 --output $mesaArchive --url "https://github.com/pal1000/mesa-dist-win/releases/download/$env:MESA_VERSION/$mesaArchive"
          & 'C:\Program Files\7-Zip\7z.exe' x $mesaArchive -omesa

          New-Item -ItemType Directory -Force -Path windows-portable | Out-Null
          Copy-Item ${{ matrix.output }} windows-portable\
          # Copy available Mesa DLLs (libglapi.dll was merged into opengl32.dll in Mesa 26+)
          $mesaDlls = @('opengl32.dll', 'libgallium_wgl.dll')
          foreach ($dll in $mesaDlls) {
            if (Test-Path "mesa\x64\$dll") {
              Copy-Item "mesa\x64\$dll" windows-portable\
              Write-Host "Bundled: $dll"
            } else {
              Write-Host "Warning: $dll not found in Mesa archive, skipping"
            }
          }
          Compress-Archive -Path windows-portable\* -DestinationPath edonish-auto-windows-portable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-${{ matrix.target }}
          path: ${{ matrix.output }}

      - name: Upload Windows portable artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows-portable
          path: edonish-auto-windows-portable.zip

  package-deb:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: edonish-auto-linux-amd64
          path: build

      - name: Create .deb package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p deb/DEBIAN deb/usr/bin deb/usr/share/applications
          chmod +x build/edonish-auto
          cp build/edonish-auto deb/usr/bin/
          cat > deb/DEBIAN/control << EOF
          Package: edonish-auto
          Version: ${VERSION}
          Section: education
          Priority: optional
          Architecture: amd64
          Depends: libgl1, libxcursor1, libxrandr2, libxinerama1, libxi6
          Maintainer: Edonish Auto Team
          Description: eDonish Auto - Automated grade management for edonish.tj
          EOF
          cat > deb/usr/share/applications/edonish-auto.desktop << EOF
          [Desktop Entry]
          Name=eDonish Auto
          Comment=Automated grade management for edonish.tj
          Exec=/usr/bin/edonish-auto
          Icon=edonish-auto
          Terminal=false
          Type=Application
          Categories=Education;
          EOF
          dpkg-deb --build deb edonish-auto_${VERSION}_amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-deb-amd64
          path: edonish-auto_*.deb

  package-rpm:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: edonish-auto-linux-amd64
          path: build

      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Create .rpm package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p rpm/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          chmod +x build/edonish-auto
          cp build/edonish-auto rpm/BUILD/
          cat > rpm/SPECS/edonish-auto.spec << 'SPEC'
          Name:           edonish-auto
          Version:        %{version}
          Release:        1%{?dist}
          Summary:        eDonish Auto - Automated grade management
          License:        Proprietary
          Requires:       mesa-libGL libXcursor libXrandr libXinerama libXi
          %description
          Desktop application for automated grade management for edonish.tj
          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 755 %{_builddir}/edonish-auto %{buildroot}/usr/bin/edonish-auto
          %files
          /usr/bin/edonish-auto
          SPEC
          rpmbuild --define "_topdir $(pwd)/rpm" --define "_builddir $(pwd)/rpm/BUILD" --define "version ${VERSION}" -bb rpm/SPECS/edonish-auto.spec
          cp rpm/RPMS/*/*.rpm edonish-auto_${VERSION}_x86_64.rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-rpm-x86_64
          path: edonish-auto_*.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build, package-deb, package-rpm]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List release files
        run: find dist -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
